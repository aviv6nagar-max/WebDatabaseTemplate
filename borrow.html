<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Book</title>
    <link rel="stylesheet" href="borrow.css">
</head>
<body>

<div class="borrow-container">
    <img id="book-image" src="" alt="Book">

    <div class="book-details">
        <h1 id="book-title"></h1>
        <h3 id="book-author"></h3>

        <p id="book-description"></p>

        <div class="rating">
            ⭐ <span id="book-rating"></span>/5
        </div>

        <button class="borrow-btn">
            Confirm Borrow
        </button>
    </div>
</div>

<script src="borrow.js"></script>

</body>
</html>
