<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suggest a Book</title>
  <link rel="stylesheet" href="suggest.css">
</head>

<body>

  <div class="container">
    <a href="index.html" class="back-btn">Back</a>

    <h1>Suggest a Book</h1>


    <form action="#" method="post">

      <label for="bookName">Book Name</label>
      <input type="text" id="bookName" name="bookName" placeholder="Enter book name" required>

      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Write a short description..." required></textarea>

      <label for="imageUrl">Book Image URL</label>
      <input type="url" id="imageUrl" name="imageUrl" placeholder="Paste image link here">

      <button type="submit">Send</button>

    </form>

  </div>

</body>
</html>
