<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="signUp.css" />
  <title>Sign Up</title>
</head>

<body class="signup-page">
  <a href="index.html" class="back-btn">Back</a>

  <div class="signup-container">
    <h2>Sign Up</h2>

    <input id="usernameInput" placeholder="Username" />

    <div class="password-wrapper">
      <input id="passwordInput" type="password" placeholder="Password" />
      <span class="eye-icon" onclick="togglePassword('passwordInput', this)">👁️</span>
    </div>

    <div class="password-wrapper">
      <input id="confirmInput" type="password" placeholder="Confirm Password" />
      <span class="eye-icon" onclick="togglePassword('confirmInput', this)">👁️</span>
    </div>

    <button id="submitButton">Create Account</button>

    <p>Already have an account? <a href="login.html">Login</a></p>

    <div id="errorDiv"></div>
  </div>

  <script>
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);

      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁️";
      }
    }
  </script>

  <script type="module" src="signUp.js"></script>
</body>
</html>
